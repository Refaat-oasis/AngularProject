<div class="container mt-5 pt-5">

  <div class="d-flex justify-content-between align-items-center mb-5">
    <h3 class="fw-bold text-theme-primary">My Products</h3>

    <button (click)="router.navigate(['/seller/products/create'])" class="btn btn-primary-merchant">
      + Add Product
    </button>
  </div>

  <div class="row g-4">

    @for (product of products(); track product.id) {
      <div class="col-md-4">

        <div class="merchant-card h-100 p-0 border-0 overflow-hidden shadow-sm transition-all">

          <div style="height:220px; overflow:hidden;" class="bg-theme-variant">
            <img [src]="baseUrl + product.image"
                 class="w-100 h-100 object-fit-cover transition-transform hover-scale">
          </div>

          <div class="p-4">

            <h5 class="fw-bold text-theme-primary">{{ product.name }}</h5>

            <p class="text-theme-variant small line-clamp-2 mb-3">{{ product.description }}</p>

            <p class="fw-bold text-theme-primary mb-4">{{ product.price | currency }}</p>

            <div class="d-flex gap-2">

              <button (click)="router.navigate(['/seller/products/edit', product.id])"
                 class="btn btn-outline-theme w-50">
                Edit
              </button>

              <button class="btn btn-danger w-50"
                (click)="openConfirm(product.id)"
                data-bs-toggle="modal"
                data-bs-target="#deleteModal">
                Delete
              </button>

            </div>

          </div>
        </div>

      </div>
    }

  </div>

</div>



<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-theme-surface border-theme rounded-4">

      <div class="modal-header border-bottom border-theme">
        <h5 class="modal-title text-theme-primary">Confirm Delete</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body text-theme-primary py-4">
        Are you sure you want to delete this product? This action cannot be undone.
      </div>

      <div class="modal-footer border-top border-theme">
        <button class="btn btn-link text-theme-variant text-decoration-none" data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-danger px-4"
                (click)="confirmDelete()"
                data-bs-dismiss="modal">
          Delete
        </button>
      </div>

    </div>
  </div>
</div>
