<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">My Products</h3>

    <a routerLink="/seller/products/create" class="btn btn-dark">
      + Add Product
    </a>
  </div>

  <div class="row g-4">

    @for (product of products(); track product.id) {
      <div class="col-md-4">

        <div class="card shadow-sm border-0 rounded-4 h-100">

          <img [src]="baseUrl + product.image"
               class="card-img-top"
               style="height:220px; object-fit:cover;">

          <div class="card-body">

            <h5 class="fw-bold">{{ product.name }}</h5>

            <p class="text-muted small">{{ product.description }}</p>

            <p class="fw-bold">{{ product.price | currency }}</p>

            <div class="d-flex gap-2">

              <a [routerLink]="['/seller/products/edit', product.id]"
                 class="btn btn-outline-dark w-50">
                Edit
              </a>

              <button class="btn btn-danger w-50"
            (click)="openConfirm(product.id)"
            data-bs-toggle="modal"
            data-bs-target="#deleteModal">
      Delete
    </button>


            </div>

          </div>
        </div>

      </div>
    }

  </div>

</div>



<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content rounded-3">

      <div class="modal-header">
        <h5 class="modal-title">Confirm Delete</h5>
      </div>

      <div class="modal-body">
        Are you sure you want to delete this product?
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-danger"
                (click)="confirmDelete()"
                data-bs-dismiss="modal">
          Delete
        </button>
      </div>

    </div>
  </div>
</div>
