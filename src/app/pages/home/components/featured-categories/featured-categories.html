<section class="py-5 mt-4">
  <div class="container-fluid px-lg-6 max-w-7xl">
    <div class="text-center mb-5 max-w-2xl mx-auto">
      <h2 class="h3 fw-bold mb-0 text-theme-primary font-editorial tracking-wider text-uppercase">Curated Categories</h2>
    </div>

    @if (loading()) {
      <div class="d-flex justify-content-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    }

    <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 justify-content-center g-4 text-center">
      @for (cat of categories(); track cat.id) {
        <div class="col">
          <button type="button" class="category-trigger d-flex flex-column align-items-center group border-0 bg-transparent p-0 w-100" (click)="navigateToProducts(cat.id)" [attr.aria-label]="'Browse ' + cat.name + ' products'">
            <div class="rounded-circle overflow-hidden mb-3 bg-surface-container-low transition-all group-hover-scale shadow-sm p-2 border border-theme" style="width: 140px; height: 140px;">
              <img [src]="cat.imageUrl ? cat.imageUrl : 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&q=80&w=300'"
                   class="w-100 h-100 object-fit-cover rounded-circle" [alt]="cat.name" style="filter: contrast(1.1);"
                   (error)="useFallbackImage($event)">
            </div>
            <h5 class="h6 fw-bold text-theme-primary font-editorial tracking-wider uppercase mb-1">{{ cat.name }}</h5>
          </button>
        </div>
      }
    </div>
  </div>
</section>
