<section class="py-5 container-fluid px-lg-5 max-w-7xl">
  <div class="text-center mb-5 max-w-2xl mx-auto">
    <h2 class="h2 fw-bold tracking-tight mb-3 text-theme-primary">Master Artisans</h2>
    <p class="text-theme-variant">Connect directly with the world’s most respected curators and fabricators.</p>
  </div>
  
  <div class="row row-cols-1 row-cols-md-3 g-5">
    @for (vendor of vendors(); track vendor.id) {
      <div class="col">
        <div class="d-flex flex-column align-items-center text-center group cursor-pointer">
          <div class="vendor-avatar mb-4 overflow-hidden rounded-circle border-theme p-1">
            <img [src]="vendor.imageUrl" class="w-100 h-100 object-fit-cover rounded-circle transition-all group-hover-scale" [alt]="vendor.name">
          </div>
          <div class="mb-3">
            <h4 class="h4 fw-bold mb-1 text-theme-primary">{{ vendor.name }}</h4>
            <p class="text-theme-variant fw-medium small">{{ vendor.specialty }}</p>
          </div>
          <p class="text-theme-variant small px-4 mb-4 line-clamp-2">{{ vendor.description }}</p>
          <div class="d-flex align-items-center gap-1 text-theme-variant">
            <span class="material-symbols-outlined fs-6" style="font-variation-settings: 'FILL' 1;">star</span>
            <span class="material-symbols-outlined fs-6" style="font-variation-settings: 'FILL' 1;">star</span>
            <span class="material-symbols-outlined fs-6" style="font-variation-settings: 'FILL' 1;">star</span>
            <span class="material-symbols-outlined fs-6" style="font-variation-settings: 'FILL' 1;">star</span>
            <span class="material-symbols-outlined fs-6" style="font-variation-settings: 'FILL' 1;">star</span>
            <span class="ms-2 small fw-bold text-theme-primary">{{ vendor.rating }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</section>
