<app-navbar [fixed]="false"></app-navbar>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="logo">
      <h2>Admin Panel</h2>
    </div>
    <nav class="nav-menu">
      <a routerLink="/admin/users" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined" aria-hidden="true">people</span>
        <span>Users</span>
      </a>
      <a routerLink="/admin/products" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined" aria-hidden="true">inventory_2</span>
        <span>Products</span>
      </a>
      <a routerLink="/admin/categories" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined" aria-hidden="true">category</span>
        <span>Categories</span>
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active" class="nav-item">
        <span class="material-symbols-outlined" aria-hidden="true">shopping_bag</span>
        <span>Orders</span>
      </a>
    </nav>
  </aside>
  <main class="content">
    <header class="topbar">
      <h1>{{ pageTitle }}</h1>
      <p>{{ pageDescription }}</p>
    </header>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
