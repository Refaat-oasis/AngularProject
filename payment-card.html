<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout – Credit Card Payment | Architectural Merchant</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root {
            /* Stitch Design System Tokens - Architectural Merchant */
            --color-background: #F8F9FA;
            --color-surface: #F8F9FA;
            --color-surface-low: #F3F4F5;
            --color-surface-lowest: #FFFFFF;
            --color-primary: #041627;
            --color-primary-container: #1A2B3C;
            --color-secondary: #006397;
            --color-on-surface: #191C1D;
            --color-on-surface-variant: #44474C;
            --color-error: #BA1A1A;
            --color-error-container: #FFDAD6;
            --color-outline-variant: rgba(196, 198, 205, 0.15);
            
            --font-display: 'Manrope', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            
            --radius-md: 8px;
            --radius-lg: 16px;
            
            --shadow-ambient: 0px 12px 32px rgba(25, 28, 29, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-background);
            color: var(--color-on-surface);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header & Progress Indicator */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(16px);
            padding: var(--spacing-md) 0;
            margin-bottom: var(--spacing-xl);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 var(--spacing-md);
        }

        h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.75rem;
            color: var(--color-primary);
            letter-spacing: -0.02em;
        }

        .progress-indicator {
            display: flex;
            gap: var(--spacing-md);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .step {
            color: var(--color-on-surface-variant);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step.active {
            color: var(--color-secondary);
        }

        .step.completed {
            color: var(--color-primary);
        }

        /* Main Content */
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: calc(100vh - 120px);
            padding: var(--spacing-xl) var(--spacing-md);
        }

        .payment-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--color-surface-lowest);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-ambient);
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin-bottom: var(--spacing-lg);
            color: var(--color-primary);
            text-align: center;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--color-on-surface-variant);
        }

        .input-field {
            width: 100%;
            padding: 12px var(--spacing-md);
            border-radius: var(--radius-md);
            background-color: var(--color-surface-low);
            border: 1px solid transparent;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            background-color: var(--color-surface-lowest);
            border-color: var(--color-secondary);
            box-shadow: 0 0 0 4px rgba(0, 99, 151, 0.1);
        }

        /* Stripe Element specific styling */
        #card-element {
            padding: 14px var(--spacing-md);
            background-color: var(--color-surface-low);
            border-radius: var(--radius-md);
        }

        .StripeElement--focus {
            background-color: var(--color-surface-lowest) !important;
            border: 1px solid var(--color-secondary) !important;
        }

        #card-errors {
            color: var(--color-error);
            font-size: 0.8125rem;
            margin-top: var(--spacing-sm);
            min-height: 20px;
        }

        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: var(--spacing-md);
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.125rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-container) 100%);
            color: white;
            margin-top: var(--spacing-xl);
            box-shadow: 0 4px 12px rgba(4, 22, 39, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.01);
            filter: brightness(1.1);
        }

        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: var(--spacing-lg);
            color: var(--color-secondary);
            font-size: 0.875rem;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <h1>Architectural Merchant</h1>
        <nav class="progress-indicator">
            <span class="step completed">Cart</span>
            <span class="step">•</span>
            <span class="step active">Payment</span>
            <span class="step">•</span>
            <span class="step">Confirmation</span>
        </nav>
    </div>
</header>

<main class="page-wrapper">
    <div class="payment-container">
        <h2 class="section-title">Credit Card Payment</h2>
        
        <form id="payment-form">
            <div class="form-group">
                <label for="cardholder-name">Full Name on Card</label>
                <input type="text" id="cardholder-name" class="input-field" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="card-element">Card Details</label>
                <div id="card-element">
                    <!-- A Stripe Element will be inserted here. -->
                </div>
                <!-- Used to display form errors. -->
                <div id="card-errors" role="alert"></div>
            </div>

            <button id="submit-button" class="btn btn-primary">
                <span id="button-spinner" class="loading-spinner hidden"></span>
                <span id="button-text">Pay Now ($2,210.00)</span>
            </button>

            <a href="checkout-payment.html" class="back-link">← Go back to payment selection</a>
        </form>

        <div style="margin-top: var(--spacing-xl); text-align: center; opacity: 0.7;">
            <svg style="width: 48px; height: 24px; vertical-align: middle;" viewBox="0 0 48 24">
                <path fill="#6772e5" d="M13.4 10.6c0-2.3-1.8-3-3.6-3-2.6 0-4.6 1.1-4.6 3.4 0 3.7 5.1 3.1 5.1 4.7 0 .6-.5 1-1.4 1-1 0-2.3-.4-3.3-1l-.5 2.8c1 .5 2.4.9 4 .9 2.7 0 4.6-1.3 4.6-3.7 0-3.8-5.1-3.2-5.1-4.8 0-.5.5-.9 1.3-.9 1 0 2 .3 2.8.8l.7-3.2zM21 7.8c-1.3 0-2.2.6-2.6 1.2v-.8H15v10.5h3.4v-4.4c.5.5 1.3.8 2.2.8 1.7 0 3.1-1.4 3.1-3.6 0-2.3-1.3-3.7-2.7-3.7zm-1.1 5.4c-.6 0-1.1-.3-1.1-1.1s.5-1.1 1.1-1.1 1.1.2 1.1 1.1-.5 1.1-1.1 1.1zM26.2 5.5l-3.3.7v1.8h-1.6v2.5H23v5c0 1.6.7 2.4 2.1 2.4.5 0 1-.1 1.4-.2l-.1-2.6c-.3.1-.5.1-.7.1s-.4-.2-.4-.7V10.5h1.3V8.1l-1.3-.1V5.5zM35.6 7.8c-1.1 0-1.9.5-2.3 1.1v-.7h-3.4v7.4h3.4V14c.4-.6 1.3-1.1 2.2-1.1.2 0 .4 0 .6.1V9.5c-.3-.1-.5-.1-.8-.1l-.7-.1c0-1.1.1-1.5.1-1.5zM37.8 8.1V18h3.3v-9.5H37.8zM39.4 4c-1 0-1.7.8-1.7 1.8s.7 1.8 1.7 1.8 1.7-.8 1.7-1.8S40.5 4 39.4 4z"/>
            </svg>
            <p style="font-size: 0.75rem; color: var(--color-on-surface-variant); margin-top: 8px;">
                Secure payment powered by Stripe
            </p>
        </div>
    </div>
</main>

<script>
    // Placeholder Publishable Key
    const stripe = Stripe('pk_test_TYooMQauvdEDq54NiTphI7jx');
    const elements = stripe.elements();

    // Order Details
    const orderDetails = {
        OrderId: "ORD-" + Math.random().toString(36).substr(2, 9).toUpperCase(),
        Amount: 2210.00,
        Currency: "usd"
    };

    // Custom styling for Stripe Elements
    const style = {
        base: {
            color: '#041627',
            fontFamily: 'Inter, sans-serif',
            fontSmoothing: 'antialiased',
            fontSize: '16px',
            '::placeholder': {
                color: '#44474C'
            }
        },
        invalid: {
            color: '#BA1A1A',
            iconColor: '#BA1A1A'
        }
    };

    // Create an instance of the card Element.
    const card = elements.create('card', { style: style, hidePostalCode: true });

    // Add an instance of the card Element into the `card-element` <div>.
    card.mount('#card-element');

    // Handle real-time validation errors from the card Element.
    card.addEventListener('change', function(event) {
        const displayError = document.getElementById('card-errors');
        if (event.error) {
            displayError.textContent = event.error.message;
        } else {
            displayError.textContent = '';
        }
    });

    // Handle form submission.
    const form = document.getElementById('payment-form');
    const submitBtn = document.getElementById('submit-button');
    const btnText = document.getElementById('button-text');
    const btnSpinner = document.getElementById('button-spinner');

    form.addEventListener('submit', function(event) {
        event.preventDefault();

        // Disable button and show spinner
        submitBtn.disabled = true;
        btnText.textContent = 'Processing...';
        btnSpinner.classList.remove('hidden');

        const nameOnCard = document.getElementById('cardholder-name').value;

        stripe.createToken(card, { name: nameOnCard }).then(function(result) {
            if (result.error) {
                // Inform the user if there was an error.
                const errorElement = document.getElementById('card-errors');
                errorElement.textContent = result.error.message;
                
                // Reset button
                submitBtn.disabled = false;
                btnText.textContent = 'Pay Now ($2,210.00)';
                btnSpinner.classList.add('hidden');
            } else {
                // Send the token to your server.
                stripeTokenHandler(result.token, nameOnCard);
            }
        });
    });

    // Submit the token and payment details to our simulated backend.
    async function stripeTokenHandler(token, name) {
        const payload = {
            PaymentMethod: 'CreditCard',
            Name: name,
            StripeToken: token.id,
            Amount: orderDetails.Amount,
            Currency: orderDetails.Currency,
            OrderId: orderDetails.OrderId
        };

        console.log('Sending Payment Request to Backend:', payload);

        try {
            const response = await fetch('/Payment/ProcessPayment', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Success! Redirect to confirmation.
                window.location.href = 'order-confirmation.html';
            } else {
                // Simulate success for demo if backend endpoint is missing
                console.warn('Backend endpoint not found. Simulating success for demo.');
                alert('Success! Token generated: ' + token.id + '\nRedirecting to confirmation...');
                window.location.href = 'order-confirmation.html';
            }
        } catch (error) {
            console.error('Network error calling backend:', error);
            // Simulate success for demo even on network error
            alert('Payment simulation successful!\nToken: ' + token.id);
            window.location.href = 'order-confirmation.html';
        }
    }
</script>

</body>
</html>
