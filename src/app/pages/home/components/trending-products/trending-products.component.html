<section class="bg-theme-variant py-5 transition-all">
  <div class="container-fluid px-lg-5 max-w-7xl">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-5 pb-3 border-bottom border-theme">
      <h2 class="h3 fw-bold mb-0 text-theme-primary font-editorial tracking-wider text-uppercase">Trending Artifacts</h2>
      <a routerLink="/products" class="btn btn-link text-theme-primary fw-bold text-decoration-none d-flex align-items-center gap-2">View All <span class="material-symbols-outlined fs-6">arrow_forward</span></a>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4 text-start">
      <div class="col" *ngFor="let product of products()">
        <div class="product-card h-100 p-0 border-0 shadow-sm transition-all"
             [routerLink]="['/product', product.id]"
             style="cursor: pointer;">
          
          <div class="img-wrapper aspect-portrait bg-theme-variant">
            <img [src]="getImageUrl(product)" class="w-100 h-100 object-fit-cover hover-zoom"
                 [alt]="product.name" (error)="useFallbackImage($event)">
            
            <div class="quick-action-overlay d-flex justify-content-between align-items-center">
              <span class="text-white small fw-bold font-editorial tracking-wider">VIEW DETAILS</span>
              <button class="btn btn-light rounded-circle shadow-sm" style="width: 40px; height: 40px; padding: 0;" (click)="$event.stopPropagation(); cartService.addToCart(product.id, 1)">
                <span class="material-symbols-outlined fs-5" style="line-height: 40px;">shopping_bag</span>
              </button>
            </div>
          </div>
          
          <div class="p-4 pt-3">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <h4 class="h6 fw-bold text-theme-primary mb-0 pe-2">{{ product.name }}</h4>
              <p class="fw-bold mb-0 text-theme-primary">{{ product.price | currency }}</p>
            </div>
            <p class="text-theme-variant small mb-3 line-clamp-1 opacity-75">{{ product.description }}</p>
            @if (product.stock <= 5 && product.stock > 0) {
               <span class="badge bg-error-container text-on-error-container border-0 rounded-pill px-2 py-1" style="font-size: 0.65rem;">Only {{ product.stock }} left</span>
            } @else {
               <span class="badge bg-secondary-container text-on-secondary-container border-0 rounded-pill px-2 py-1" style="font-size: 0.65rem;" *ngIf="product.stock > 0">In Stock</span>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
